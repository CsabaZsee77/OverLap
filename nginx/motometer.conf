# nginx/motometer.conf
# MotoMeter reverse proxy konfiguráció
#
# Előfeltétel: Let's Encrypt cert megvan
#   certbot certonly --standalone -d motometer.yourdomain.com
#
# A docker-compose.yml ezt a fájlt mountolja:
#   /etc/nginx/conf.d/motometer.conf

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name motometer.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS szerver
server {
    listen 443 ssl;
    server_name motometer.yourdomain.com;

    # ── TLS ─────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/motometer.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/motometer.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Fejlécek ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         DENY;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API proxy → FastAPI backend ──────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Firmware feltöltés: nagy GPS trace → nagyobb body limit
        client_max_body_size 10M;
        proxy_read_timeout   60s;
    }

    # ── Swagger / OpenAPI docs ────────────────────────────────────────
    location /docs {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    # ── Frontend (React SPA) ──────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        # SPA: ha statikus fájl nem található, frontend nginx kezeli
        proxy_intercept_errors off;
    }

    # ── Statikus asset cache ──────────────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        proxy_pass       http://frontend:80;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public, immutable";
    }

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip              on;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml;
    gzip_min_length   1000;
    gzip_vary         on;

    # ── Log ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/motometer_access.log;
    error_log  /var/log/nginx/motometer_error.log warn;
}
